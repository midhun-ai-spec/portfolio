<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        /* Animated Background */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0a0e27 100%);
        }

        .background-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: rgba(99, 102, 241, 0.6);
            border-radius: 50%;
            pointer-events: none;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { 
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { 
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header Section */
        header {
            position: relative;
            padding: 100px 40px 80px;
            text-align: center;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%);
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
            backdrop-filter: blur(10px);
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.5), transparent);
        }

        header h1 {
            font-size: 4em;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            animation: fadeInDown 1s ease, glow 3s ease-in-out infinite;
            letter-spacing: -1px;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.5)); }
            50% { filter: drop-shadow(0 0 40px rgba(168, 85, 247, 0.8)); }
        }

        header p {
            font-size: 1.4em;
            color: #a0a0a0;
            margin-bottom: 15px;
            animation: fadeInUp 1s ease 0.2s both;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .about-section {
            font-size: 1.1em;
            line-height: 1.8;
            max-width: 700px;
            margin: 30px auto 0;
            color: #b0b0b0;
            animation: fadeInUp 1s ease 0.4s both;
            text-align: center;
        }

        .linkedin-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 35px;
            padding: 16px 40px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1em;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 1s ease 0.6s both;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .linkedin-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .linkedin-btn:hover::before {
            left: 100%;
        }

        .linkedin-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.5);
        }

        /* Section Styling */
        .section {
            padding: 80px 40px;
            position: relative;
        }

        .section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.3), transparent);
        }

        .section-title {
            font-size: 2.8em;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 50px;
            padding-bottom: 20px;
            display: inline-block;
            position: relative;
            animation: fadeIn 0.8s ease;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border-radius: 10px;
            animation: expandWidth 1s ease 0.3s both;
        }

        @keyframes expandWidth {
            from { width: 0; }
            to { width: 100%; }
        }

        /* Skills Section */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .skill-card {
            background: rgba(30, 35, 60, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 35px 30px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 0.6s ease;
            position: relative;
            overflow: hidden;
        }

        .skill-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .skill-card:hover::before {
            opacity: 1;
        }

        .skill-card:hover {
            transform: translateY(-10px) scale(1.03);
            border-color: rgba(99, 102, 241, 0.6);
            box-shadow: 0 20px 50px rgba(99, 102, 241, 0.3);
        }

        .skill-card h3 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #fff;
            position: relative;
            z-index: 1;
        }

        .skill-card p {
            font-size: 1em;
            color: #a855f7;
            font-weight: 600;
            position: relative;
            z-index: 1;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Certificates Section */
        .certificates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 35px;
            margin-top: 40px;
        }

        .certificate-card {
            background: rgba(30, 35, 60, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 0.6s ease;
            position: relative;
            overflow: hidden;
        }

        .certificate-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(180deg, #6366f1 0%, #a855f7 100%);
            transition: width 0.4s;
        }

        .certificate-card:hover::before {
            width: 100%;
            opacity: 0.1;
        }

        .certificate-card:hover {
            transform: translateY(-10px);
            border-color: rgba(99, 102, 241, 0.6);
            box-shadow: 0 20px 50px rgba(99, 102, 241, 0.3);
        }

        .certificate-card h3 {
            color: #fff;
            margin-bottom: 15px;
            font-size: 1.6em;
            position: relative;
            z-index: 1;
        }

        .certificate-card p {
            color: #b0b0b0;
            margin-bottom: 12px;
            font-size: 1.05em;
            position: relative;
            z-index: 1;
        }

        .certificate-date {
            color: #a855f7;
            font-weight: 600;
            font-size: 1em;
            margin-top: 15px;
            display: inline-block;
            position: relative;
            z-index: 1;
        }

        .certificate-preview {
            margin-top: 25px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .certificate-preview img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s;
            border: 2px solid rgba(99, 102, 241, 0.3);
        }

        .certificate-preview img:hover {
            transform: scale(1.05);
            border-color: rgba(99, 102, 241, 0.8);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4);
        }

        .pdf-indicator {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            display: inline-block;
            font-weight: 600;
            font-size: 1em;
            box-shadow: 0 5px 20px rgba(239, 68, 68, 0.3);
        }

        .view-certificate-btn {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 1;
            box-shadow: 0 5px 20px rgba(99, 102, 241, 0.3);
        }

        .view-certificate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.5);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: zoomIn 0.3s ease;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.5);
        }

        .close-modal {
            position: absolute;
            top: 30px;
            right: 50px;
            color: white;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 1001;
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.8);
        }

        .close-modal:hover {
            color: #a855f7;
            transform: rotate(90deg);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #666;
            font-size: 1.2em;
        }

        .empty-state-icon {
            font-size: 5em;
            margin-bottom: 25px;
            opacity: 0.3;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        /* Footer */
        footer {
            background: rgba(20, 25, 45, 0.8);
            backdrop-filter: blur(10px);
            color: #888;
            text-align: center;
            padding: 40px;
            font-size: 1em;
            border-top: 1px solid rgba(99, 102, 241, 0.2);
        }

        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.5), transparent);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes zoomIn {
            from {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2.5em;
            }
            
            .section-title {
                font-size: 2em;
            }
            
            .skills-grid,
            .certificates-grid {
                grid-template-columns: 1fr;
            }

            .section {
                padding: 50px 20px;
            }

            header {
                padding: 60px 20px 50px;
            }

            .close-modal {
                top: 20px;
                right: 30px;
                font-size: 40px;
            }
        }

        /* Scroll animations */
        .fade-in-on-scroll {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .fade-in-on-scroll.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="background-animation"></div>
    
    <!-- Floating particles -->
    <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
    <div class="particle" style="left: 30%; animation-delay: 4s;"></div>
    <div class="particle" style="left: 40%; animation-delay: 1s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 3s;"></div>
    <div class="particle" style="left: 60%; animation-delay: 5s;"></div>
    <div class="particle" style="left: 70%; animation-delay: 2.5s;"></div>
    <div class="particle" style="left: 80%; animation-delay: 4.5s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 1.5s;"></div>

    <div class="container">
        <header>
            <h1 id="profileName">Your Name</h1>
            <p id="profileSpec">B.Tech Student | Computer Science Engineering</p>
            <div class="about-section" id="aboutSection"></div>
            <a href="#" class="linkedin-btn" id="linkedinBtn" target="_blank" style="display: none;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
                </svg>
                Connect on LinkedIn
            </a>
        </header>

        <!-- Skills Section -->
        <div class="section">
            <h2 class="section-title">💻 Skills & Expertise</h2>
            <div class="skills-grid" id="skillsGrid">
                <div class="empty-state">
                    <div class="empty-state-icon">💡</div>
                    <p>Skills will appear here once added</p>
                </div>
            </div>
        </div>

        <!-- Certificates Section -->
        <div class="section">
            <h2 class="section-title">🏆 Certifications</h2>
            <div class="certificates-grid" id="certificatesGrid">
                <div class="empty-state">
                    <div class="empty-state-icon">📜</div>
                    <p>Certificates will appear here once added</p>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2024 <span id="footerName">Your Name</span> | Crafted with passion & innovation</p>
        </footer>
    </div>

    <div id="certificateModal" class="modal" onclick="closeModal()">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script>
        let profile = {
            name: 'Your Name',
            specialization: 'B.Tech Student | Computer Science Engineering',
            about: '',
            linkedin: ''
        };
        let skills = [];
        let certificates = [];

        window.onload = function() {
            loadData();
            displayProfile();
            displaySkills();
            displayCertificates();
        };

        function loadData() {
            const savedProfile = localStorage.getItem('profile');
            const savedSkills = localStorage.getItem('skills');
            const savedCerts = localStorage.getItem('certificates');

            if (savedProfile) profile = JSON.parse(savedProfile);
            if (savedSkills) skills = JSON.parse(savedSkills);
            if (savedCerts) certificates = JSON.parse(savedCerts);
        }

        function displayProfile() {
            document.getElementById('profileName').textContent = profile.name;
            document.getElementById('profileSpec').textContent = profile.specialization;
            document.getElementById('footerName').textContent = profile.name;

            const aboutSection = document.getElementById('aboutSection');
            if (profile.about) {
                aboutSection.textContent = profile.about;
                aboutSection.style.display = 'block';
            } else {
                aboutSection.style.display = 'none';
            }

            const linkedinBtn = document.getElementById('linkedinBtn');
            if (profile.linkedin) {
                linkedinBtn.href = profile.linkedin;
                linkedinBtn.style.display = 'inline-block';
            } else {
                linkedinBtn.style.display = 'none';
            }
        }

        function displaySkills() {
            const grid = document.getElementById('skillsGrid');
            
            if (skills.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💡</div>
                        <p>Skills will appear here once added</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = '';

            skills.forEach((skill, index) => {
                const card = document.createElement('div');
                card.className = 'skill-card';
                card.style.animationDelay = `${index * 0.1}s`;
                card.innerHTML = `
                    <h3>${skill.name}</h3>
                    <p>${skill.level}</p>
                `;
                grid.appendChild(card);
            });
        }

        function displayCertificates() {
            const grid = document.getElementById('certificatesGrid');
            
            if (certificates.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📜</div>
                        <p>Certificates will appear here once added</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = '';

            certificates.forEach((cert, index) => {
                const card = document.createElement('div');
                card.className = 'certificate-card';
                card.style.animationDelay = `${index * 0.1}s`;
                
                let filePreview = '';
                let viewButton = '';

                if (cert.fileData) {
                    if (cert.fileType && cert.fileType.startsWith('image/')) {
                        filePreview = `
                            <div class="certificate-preview">
                                <img src="${cert.fileData}" alt="${cert.name}" onclick="openModal('${cert.fileData}')">
                            </div>
                        `;
                        viewButton = `<button class="view-certificate-btn" onclick="openModal('${cert.fileData}')">🔍 View Full Certificate</button>`;
                    } else if (cert.fileType === 'application/pdf') {
                        filePreview = `
                            <div class="certificate-preview">
                                <span class="pdf-indicator">📄 PDF Certificate</span>
                            </div>
                        `;
                        viewButton = `<button class="view-certificate-btn" onclick="viewPDF(${cert.id})">📄 Open PDF</button>`;
                    }
                }

                card.innerHTML = `
                    <h3>${cert.name}</h3>
                    <p><strong>Issued by:</strong> ${cert.org}</p>
                    <p class="certificate-date">📅 ${cert.date}</p>
                    ${filePreview}
                    ${viewButton}
                `;
                grid.appendChild(card);
            });
        }

        function viewPDF(id) {
            const cert = certificates.find(c => c.id === id);
            if (cert && cert.fileData) {
                const newWindow = window.open();
                newWindow.document.write(`
                    <html>
                        <head>
                            <title>${cert.name}</title>
                            <style>
                                body { margin: 0; }
                                iframe { border: none; }
                            </style>
                        </head>
                        <body>
                            <iframe src="${cert.fileData}" width="100%" height="100%"></iframe>
                        </body>
                    </html>
                `);
            }
        }

        function openModal(imageSrc) {
            const modal = document.getElementById('certificateModal');
            const modalImg = document.getElementById('modalImage');
            modal.style.display = 'block';
            modalImg.src = imageSrc;
        }

        function closeModal() {
            document.getElementById('certificateModal').style.display = 'none';
        }

        // Close modal with Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        // Scroll animations
        function handleScrollAnimations() {
            const elements = document.querySelectorAll('.skill-card, .certificate-card');
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0)';
                    }
                });
            }, { threshold: 0.1 });

            elements.forEach(el => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(30px)';
                observer.observe(el);
            });
        }

        // Call scroll animations after content is loaded
        setTimeout(handleScrollAnimations, 100);

        // Smooth scroll for any internal links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    </script>
</body>
</html>
